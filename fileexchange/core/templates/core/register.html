<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% extends 'core/base.html' %}

{% block content %}

<h2>Register</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}

    <input type="text" name="username"><br><br>
    <input type="password" name="password"><br><br>

    <button type="submit">Create User</button>
</form>

<a href="/">Back</a>

{% endblock %}
</body>
</html>
