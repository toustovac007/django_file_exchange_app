{% extends 'core/base.html' %}

{% block content %}

<h2>Share file</h2>

<p>{{ file.original_name }}</p>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}

    <label>Username:</label>
    <input type="text" name="username">

    <button type="submit">
        Share
    </button>

</form>

{% endblock %}
